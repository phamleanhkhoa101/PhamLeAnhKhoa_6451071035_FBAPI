groups:
  - name: kafka_alerts
    rules:
      - alert: DeadLetterQueueReceived
        expr: |
          increase(
            kafka_topic_partition_current_offset{
              topic="dead_letter"
            }[1m]
          ) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Dead letter queue co message moi"
          description: >
            Topic dead_letter vua nhan them message.
            Kiem tra Kafka UI tai http://localhost:8080
            de xem noi dung va xu ly thu cong.

      - alert: KafkaConsumerLagHigh
        expr: kafka_consumergroup_lag > 500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Consumer lag cao bat thuong"
          description: >
            Consumer group {{ $labels.consumergroup }}
            dang lag {{ $value }} message tren topic
            {{ $labels.topic }}.

      - alert: WebhookReceiverSilent
        expr: |
          increase(
            kafka_topic_partition_current_offset{
              topic="raw_events"
            }[5m]
          ) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Khong co event moi tu Facebook trong 10 phut"
          description: >
            Topic raw_events khong co message moi.
            Kiem tra lai Facebook Webhook subscription
            hoac webhook-service.
