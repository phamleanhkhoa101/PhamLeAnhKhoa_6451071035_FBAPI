global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "alert.rules.yml"

scrape_configs:
  # Prometheus tự scrape chính nó
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape Kafka metrics từ kafka-exporter
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]