services:
  # =========================
  # Zookeeper
  # =========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: fb_api-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # =========================
  # Kafka Broker
  # =========================
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fb_api-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # kafka:9092 dùng cho container gọi nhau
      # localhost:29092 dùng cho app chạy ngoài Docker
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # =========================
  # Kafka UI
  # =========================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fb_api-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: fb_api-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  # =========================
  # Kafka Exporter
  # =========================
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: fb_api-kafka-exporter
    depends_on:
      - kafka
    ports:
      - "9308:9308"
    command:
      - "--kafka.server=kafka:9092"

  # =========================
  # PostgreSQL
  # =========================
  postgres:
    image: postgres:16
    container_name: fb_api-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # =========================
  # Prometheus
  # =========================
  prometheus:
    image: prom/prometheus:latest
    container_name: fb_api-prometheus
    depends_on:
      - kafka-exporter
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  # =========================
  # Alertmanager
  # =========================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: fb_api-alertmanager
    depends_on:
      - prometheus
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"

  # =========================
  # Backend API Service
  # Port 3000
  # =========================
  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: backend-api
    depends_on:
      - kafka
      - postgres
    ports:
      - "3000:3000"
    environment:
      PORT: 3000

      KAFKA_BROKER: kafka:9092

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      FACEBOOK_PAGE_ID: ${FACEBOOK_PAGE_ID}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${FACEBOOK_PAGE_ACCESS_TOKEN}
    restart: unless-stopped

  # =========================
  # Webhook Service
  # Port 3001
  # =========================
  webhook-service:
    build:
      context: ./webhook-service
      dockerfile: Dockerfile
    container_name: webhook-service
    depends_on:
      - kafka
    ports:
      - "3001:3001"
    environment:
      PORT: 3001

      KAFKA_BROKER: kafka:9092

      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
      FACEBOOK_VERIFY_TOKEN: ${FACEBOOK_VERIFY_TOKEN}
    restart: unless-stopped

  # =========================
  # Core Service
  # Port 3002
  # =========================
  core-service:
    build:
      context: ./core-service
      dockerfile: Dockerfile
    container_name: core-service
    depends_on:
      - kafka
      - postgres
    ports:
      - "3002:3002"
    environment:
      PORT: 3002

      KAFKA_BROKER: kafka:9092

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      # Nếu dùng Gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY}

      # Nếu dùng OpenAI thì thêm biến này
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    restart: unless-stopped

  # =========================
  # Retry Service
  # Port 3003
  # =========================
  retry-service:
    build:
      context: ./retry-service
      dockerfile: Dockerfile
    container_name: retry-service
    depends_on:
      - kafka
    ports:
      - "3003:3003"
    environment:
      PORT: 3003

      KAFKA_BROKER: kafka:9092

      MAX_RETRY: ${MAX_RETRY}
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data: