openapi: 3.0.3
info:
  title: Facebook API Integration - Backend Service
  description: API Service kết nối với Facebook Graph API, xử lý tác vụ thông qua Kafka và Database Postgres.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local Development Server

paths:
  # --- ENDPOINT: /health ---
  /health:
    get:
      summary: Kiểm tra trạng thái hoạt động của hệ thống (Health Check)
      tags:
        - System
      responses:
        '200':
          description: Service hoạt động bình thường
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: backend-api
                  status:
                    type: string
                    example: ok
                  circuit_breaker:
                    type: object
                    properties:
                      state:
                        type: string
                        example: CLOSED

  # --- ENDPOINT: /posts ---
  /posts:
    get:
      summary: Lấy danh sách các bài viết (posts) từ Facebook Page
      tags:
        - Facebook Posts
      responses:
        '200':
          description: Lấy danh sách bài viết thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '500':
          description: Lỗi hệ thống hoặc lỗi kết nối Facebook Graph API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --- ENDPOINT: /post ---
  /post:
    post:
      summary: Tạo một bài viết mới trên Facebook Page
      tags:
        - Facebook Posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  description: Nội dung của bài viết cần đăng
                  example: "Xin chào thế giới! Đây là bài viết được đăng tự động từ Backend API."
      responses:
        '200':
          description: Đăng bài viết thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Thiếu tham số bắt buộc (message)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi kết nối Facebook API hoặc lưu trữ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --- ENDPOINT: /comments ---
  /comments:
    get:
      summary: Lấy danh sách các bình luận (comments) của một bài viết cụ thể
      tags:
        - Facebook Comments
      parameters:
        - name: post_id
          in: query
          required: true
          description: ID của bài viết Facebook cần lấy bình luận
          schema:
            type: string
            example: "1234567890_0987654321"
      responses:
        '200':
          description: Lấy danh sách bình luận thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Thiếu tham số post_id trong query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi lấy danh sách bình luận
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Thao tác thành công"
        data:
          type: object
          description: Dữ liệu trả về chi tiết từ Facebook API
          example:
            id: "120391203912_30291391203"

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: "MISSING_MESSAGE"
            message:
              type: string
              example: "Message is required"