openapi: 3.0.3
info:
  title: Facebook API Integration - Backend Service
  description: Backend proxy for Facebook Graph API with Kafka and Postgres integration.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local Development Server

paths:
  /health:
    get:
      summary: Check backend service health
      tags:
        - System
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: backend-api
                  status:
                    type: string
                    example: ok
                  circuit_breaker:
                    type: object
                    properties:
                      failureCount:
                        type: integer
                        example: 0
                      threshold:
                        type: integer
                        example: 5
                      state:
                        type: string
                        example: closed
                      openedAt:
                        nullable: true
                        type: integer
                        example: null
                      cooldownMs:
                        type: integer
                        example: 30000

  /posts:
    get:
      summary: Get Facebook Page posts through backend proxy
      tags:
        - Facebook Posts
      responses:
        '200':
          description: Posts fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '500':
          description: Facebook API or server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /post:
    post:
      summary: Create a new Facebook Page post through backend proxy
      description: Requires admin header `x-admin-token` to create a post.
      tags:
        - Facebook Posts
      security:
        - AdminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  description: Content of the Facebook post
                  example: Xin chao, day la bai viet duoc dang qua backend API.
      responses:
        '200':
          description: Post created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Missing required field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Admin token is missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Facebook API or server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /comments:
    get:
      summary: Get comments of a Facebook post through backend proxy
      tags:
        - Facebook Comments
      parameters:
        - name: post_id
          in: query
          required: true
          description: Facebook post ID
          schema:
            type: string
            example: "1234567890_0987654321"
      responses:
        '200':
          description: Comments fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Missing post_id query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Facebook API or server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    AdminToken:
      type: apiKey
      in: header
      name: x-admin-token

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Posts fetched successfully
        data:
          description: Raw payload returned by backend/Facebook API
          oneOf:
            - type: object
            - type: array
            - type: string
            - type: number
            - type: boolean
            - nullable: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        code:
          type: string
          example: MISSING_MESSAGE
        message:
          type: string
          example: Message is required
        details:
          nullable: true
          oneOf:
            - type: object
            - type: string
          example: null
